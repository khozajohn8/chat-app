name: "CodeQL Security Analysis"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays at midnight

jobs:
  analyze:
    name: Analyze CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
        # Learn more about CodeQL language support:
        # https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # For JavaScript/TypeScript, you can specify a custom query suite
        queries: security-extended,security-and-quality
        # Use 'security-extended' for more thorough security checks
        # Use 'security-and-quality' for security + code quality

    # Install dependencies for client
    - name: Client - Install dependencies
      working-directory: ./client
      if: matrix.language == 'javascript-typescript'
      run: |
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install --legacy-peer-deps --force
        npm install ajv@8 ajv-keywords@5 --save-dev --force
        # Optional: Build to ensure all files are processed
        npm run build
      env:
        CI: false
        NODE_OPTIONS: --openssl-legacy-provider
        DISABLE_ESLINT_PLUGIN: true

    # Install dependencies for server
    - name: Server - Install dependencies
      working-directory: ./server
      if: matrix.language == 'javascript-typescript'
      run: |
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install

    # Perform CodeQL analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        # Upload results to GitHub Security tab
        upload: always