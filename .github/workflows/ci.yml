name: CI - Test and Build Chat Application

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        # NO CACHE HERE - we'll handle it manually

    # ---------- CLIENT TESTS ----------
    - name: Client - Clean install
      working-directory: ./client
      run: |
        # Remove everything for a fresh start
        rm -rf node_modules package-lock.json
        npm cache clean --force
        # Install with legacy peer deps
        npm install --legacy-peer-deps
        # Show what's installed
        npm list --depth=0

    - name: Client - Build
      working-directory: ./client
      run: npm run build
      env:
        CI: false
        DISABLE_ESLINT_PLUGIN: true
        NODE_OPTIONS: --openssl-legacy-provider

    # ---------- SERVER TESTS ----------
    - name: Server - Clean install
      working-directory: ./server
      run: |
        # Fresh install every time
        rm -rf node_modules package-lock.json
        npm cache clean --force
        npm install
        npm list --depth=0

    - name: Server - Test startup
      working-directory: ./server
      run: |
        node -e "require('./index.js')" &
        SERVER_PID=$!
        sleep 5
        kill $SERVER_PID || true
      env:
        PORT: 5001

    # NO CACHING AT ALL - we want fresh installs every time