# .github/workflows/ci-cd.yml
name: CI/CD - Test, Build, Push and Deploy

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CI: false
  NODE_OPTIONS: --openssl-legacy-provider
  DISABLE_ESLINT_PLUGIN: true
  GENERATE_SOURCEMAP: false
  AWS_REGION: us-east-1
  ECR_REPOSITORY_CLIENT: chat-app-client
  ECR_REPOSITORY_SERVER: chat-app-server

jobs:
  test:
    name: Test Code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Client Tests
      - name: Client - Install dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps --force
          npm install ajv@8 ajv-keywords@5 --save-dev --force

      - name: Client - Build
        working-directory: ./client
        run: |
          rm -rf node_modules/.cache
          npm run build
        env:
          SKIP_PREFLIGHT_CHECK: true

      - name: Client - Verify build
        working-directory: ./client
        run: |
          if [ -d "build" ]; then
            echo "✅ Build directory exists (size: $(du -sh build | cut -f1))"
          else
            echo "❌ Build failed"
            exit 1
          fi

      # Server Tests
      - name: Server - Install dependencies
        working-directory: ./server
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Server - Test startup
        working-directory: ./server
        run: |
          node -e "require('./index.js')" &
          SERVER_PID=$!
          sleep 5
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Server started successfully"
            kill $SERVER_PID
          else
            echo "❌ Server failed to start"
            exit 1
          fi
        env:
          PORT: 5001

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass
    if: github.event_name != 'pull_request'  # Only on pushes/tags, not PRs
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Create repositories if needed
      - name: Create ECR repositories
        run: |
          for repo in ${{ env.ECR_REPOSITORY_CLIENT }} ${{ env.ECR_REPOSITORY_SERVER }}; do
            echo "🔍 Checking $repo..."
            if ! aws ecr describe-repositories --repository-names $repo 2>/dev/null; then
              echo "📦 Creating $repo..."
              aws ecr create-repository \
                --repository-name $repo \
                --image-scanning-configuration scanOnPush=true
            else
              echo "✅ $repo exists"
            fi
          done

      # Metadata for client
      - name: Extract metadata for client
        id: meta-client
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CLIENT }}:latest" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CLIENT }}:$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CLIENT }}:${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Metadata for server
      - name: Extract metadata for server
        id: meta-server
        run: |
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_SERVER }}:latest" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_SERVER }}:$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_SERVER }}:${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Build and push client
      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push server
      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Vulnerability scanning
      - name: Scan client image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_CLIENT }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Scan server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_SERVER }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'