# docker-compose.yml - For local development
version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_OPTIONS=--openssl-legacy-provider
    networks:
      - chat-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
    networks:
      - chat-network
    restart: unless-stopped

networks:
  chat-network:
    driver: bridge